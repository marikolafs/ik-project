spring:
  datasource:
    url: jdbc:mysql://localhost:3306/myapp
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: user
    password: password
    session:
      store-type: none

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect